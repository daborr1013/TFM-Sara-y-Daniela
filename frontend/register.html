

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Litterally</title>
    <link rel="icon" href="media/images/iconoPestanaClara.png">
    <link rel="stylesheet" href="css/registro.css">
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <a href="index.html">
                <img src="media/images/litGrande.png" alt="Litterally">
            </a>
            <h1>Crear Cuenta</h1>
            <p>Únete a Litterally</p>
        </div>
        
        <form method="POST" action="" data-register-form>
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    placeholder="Juan Pérez"
                    required
                    minlength="3"
                >
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="tu@correo.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="contraseña">Contraseña</label>
                <input
                    type="password"
                    id="contraseña"
                    name="contraseña"
                    placeholder="Mínimo 8 caracteres"
                    required
                    minlength="8"
                    autocomplete="new-password"
                >
            </div>

            <div class="form-group">
                <label for="confirmar_contraseña">Confirmar Contraseña</label>
                <input
                    type="password"
                    id="confirmar_contraseña"
                    name="confirmar_contraseña"
                    placeholder="Repite tu contraseña"
                    required
                    minlength="8"
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="register-button">Crear Cuenta</button>
        </form>

        <div class="form-message" data-form-message></div>
        <div class="login-link">
            <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
        </div>
        
        <div class="back-link">
            <a href="index.html">&larr; Volver al inicio</a>
        </div>
    </div>
    <script src="js/registro.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
