

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Litterally</title>
    <link rel="icon" href="media/images/iconoPestanaClara.png">
    <link rel="stylesheet" href="css/registro.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <a href="index.html">
                <img src="media/images/litGrande.png" alt="Litterally">
            </a>
            <h1>Iniciar Sesión</h1>
            <p>Bienvenido a Litterally</p>
        </div>
        
        
        
        <form method="POST" action="" data-login-form>
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="tu@correo.com" 
                    required
                    autocomplete="email"
                >
            </div>
            
            <div class="form-group">
                <label for="contraseña">Contraseña</label>
                <input 
                    type="password" 
                    id="contraseña" 
                    name="contraseña" 
                    placeholder="Tu contraseña" 
                    required
                    autocomplete="current-password"
                >
            </div>
            
            <button type="submit" class="login-button">Iniciar Sesión</button>
        </form>
        
        <div class="form-message" data-form-message></div>
        <div class="signup-link">
            <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
        </div>
        
        <div class="back-link">
            <a href="index.html">&larr; Volver al inicio</a>
        </div>
    </div>
    <script src="js/registro.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
